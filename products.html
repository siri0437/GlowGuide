<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Products | GlowGuide</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-purple-50 transition-all duration-300">

  <!-- NAVBAR -->

  <nav class="bg-white shadow-md p-4">

    <div class="container mx-auto flex justify-between items-center">

      <h1 class="text-3xl font-bold text-purple-600">
        GlowGuide
      </h1>

      <div class="space-x-6">

        <a href="index.html" class="hover:text-purple-600">
          Home
        </a>

        <a href="products.html" class="hover:text-purple-600">
          Products
        </a>

        <a href="compare.html" class="hover:text-purple-600">
          Compare
        </a>

        <a href="routine.html" class="hover:text-purple-600">
          Routine
        </a>

      </div>

    </div>

  </nav>

  <!-- PRODUCTS -->

  <div class="container mx-auto p-10">

    <h1 class="text-4xl font-bold text-purple-600 mb-10">

      Skincare Products

    </h1>

    <!-- FILTER SECTION -->

    <div class="mb-10 grid md:grid-cols-3 gap-5">

      <!-- SEARCH -->

      <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
        class="p-3 rounded-xl border border-gray-300"
      />

      <!-- SKIN FILTER -->

      <select
        id="skinFilter"
        class="p-3 rounded-xl border border-gray-300">

        <option value="all">
          All Skin Types
        </option>

        <option value="Dry">
          Dry
        </option>

        <option value="Oily">
          Oily
        </option>

        <option value="Combination">
          Combination
        </option>

      </select>

      <!-- PRICE FILTER -->

      <select
        id="priceFilter"
        class="p-3 rounded-xl border border-gray-300">

        <option value="all">
          All Prices
        </option>

        <option value="500">
          Below ₹500
        </option>

        <option value="700">
          Below ₹700
        </option>

      </select>

    </div>

    <!-- PRODUCT CARDS -->

    <div
      id="products-container"
      class="grid grid-cols-1 md:grid-cols-3 gap-8">

    </div>

  </div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <!-- CUSTOM JS -->

  <script src="js/firebase-config.js"></script>

  <script src="js/app.js"></script>

  <script src="js/wishlist.js"></script>

  <script src="js/products.js"></script>

</body>

</html>
