<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Routine Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-purple-50 min-h-screen p-10">

  <div class="max-w-3xl mx-auto">

    <h1 class="text-5xl font-bold text-purple-600 mb-10">

      Skincare Routine Tracker 🧴

    </h1>

    <!-- ADD ROUTINE -->

    <div class="bg-white p-8 rounded-3xl shadow-xl">

      <input
        type="text"
        id="routineInput"
        placeholder="Add skincare step..."
        class="w-full border border-gray-300 p-4 rounded-xl"
      />

      <button
        onclick="addRoutine()"
        class="mt-5 bg-purple-600 text-white px-6 py-3 rounded-xl hover:bg-purple-700">

        Save Routine

      </button>

    </div>

    <!-- ROUTINES -->

    <div
      id="routineList"
      class="mt-10 space-y-5">

    </div>

  </div>

  <!-- FIREBASE -->

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <!-- CUSTOM JS -->

  <script src="js/firebase-config.js"></script>

  <script src="js/app.js"></script>

  <script src="js/routine.js"></script>

</body>

</html>
